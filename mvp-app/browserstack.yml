# BrowserStack Automate — used with Playwright via caps in playwright.config.ts (browserstack.local: true).
# Set BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY in the environment (do not commit secrets).
# Run BrowserStack Local (CLI or app) so remote browsers can reach http://127.0.0.1:3000 before test:e2e:bs.
userName: "${BROWSERSTACK_USERNAME}"
accessKey: "${BROWSERSTACK_ACCESS_KEY}"
framework: playwright
buildName: pilot108-design-e2e
projectName: medmate-mvp-app
browserstackLocal: true
parallelsPerPlatform: 1
